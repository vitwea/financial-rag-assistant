version: "3.9"

services:
  # Streamlit UI
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped

  # FastAPI REST API (optional, run alongside UI)
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: uvicorn src.api.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
